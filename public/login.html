<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - MedNexis</title>
  <link rel="stylesheet" href="css/style.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
  <nav class="navbar">
    <a href="index.html" class="logo">MedNexis ⚕️</a>
  </nav>

  <div class="auth-container">
    <div class="auth-card">
      <h2>Welcome Back</h2>
      <div id="alert"></div>
      <form id="loginForm">
        <div class="form-group">
          <label>Email Address</label>
          <input type="email" id="email" required placeholder="Enter your email">
        </div>
        <div class="form-group">
          <label>Password</label>
          <input type="password" id="password" required placeholder="Enter your password">
        </div>
        <button type="submit" class="btn">Login</button>
      </form>
      <div class="switch-auth">
        Don't have an account? <a href="register.html">Register here</a>
      </div>
    </div>
  </div>

  <script src="js/api.js"></script>
  <script>
    checkAuthAndRedirect();
    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;
      
      try {
        const res = await fetchAPI('/auth/login', 'POST', { email, password });
        localStorage.setItem('mednexis_token', res.token);
        localStorage.setItem('mednexis_role', res.role);
        localStorage.setItem('mednexis_name', res.name);
        
        showAlert('Login successful!', false);
        setTimeout(() => checkAuthAndRedirect(), 1000);
      } catch (err) {
        showAlert(err.message);
      }
    });
  </script>
</body>
</html>
