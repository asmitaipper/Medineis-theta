<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Patient Records - MedNexis</title>
  <link rel="stylesheet" href="css/style.css">
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body>
  <nav class="navbar">
    <a href="doctor-dashboard.html" class="logo">MedNexis ⚕️</a>
    <div class="nav-links">
      <a href="doctor-dashboard.html">Dashboard</a>
      <a href="records.html" class="active">Patient Records</a>
      <button onclick="logout()" class="logout-btn">Logout</button>
    </div>
  </nav>

  <div id="root"></div>

  <script src="js/api.js"></script>
  <script>
    if (localStorage.getItem('mednexis_role') !== 'Doctor') {
      window.location.href = 'index.html';
    }
  </script>
  <script type="text/babel">
    const { useState, useEffect } = React;

    function DoctorRecords() {
      const [records, setRecords] = useState([]);
      const [patients, setPatients] = useState([]);
      const [formData, setFormData] = useState({ patientId: '', history: '', diagnosis: '', medicines: '' });
      const [aiSuggestion, setAiSuggestion] = useState(null);
      const [loadingAI, setLoadingAI] = useState(false);

      useEffect(() => {
        fetchRecords();
        fetchPatients();
      }, []);

      const fetchRecords = async () => {
        try {
          const data = await fetchAPI('/records');
          setRecords(data || []);
        } catch (err) { console.error(err); }
      };

      const fetchPatients = async () => {
        try {
          const data = await fetchAPI('/auth/users?role=Patient');
          setPatients(data || []);
        } catch (err) { console.error(err); }
      };

      const getAiSuggestion = async () => {
        if (!formData.history) return alert('Enter patient history first.');
        setLoadingAI(true);
        try {
          const res = await fetchAPI('/ai/suggest', 'POST', { symptoms: formData.history });
          setAiSuggestion(res.suggestions.join(' | '));
        } catch (err) {
          alert('AI Error: ' + err.message);
        } finally {
          setLoadingAI(false);
        }
      };

      const handleSubmit = async (e) => {
        e.preventDefault();
        try {
          await fetchAPI('/records', 'POST', formData);
          setFormData({ patientId: '', history: '', diagnosis: '', medicines: '' });
          setAiSuggestion(null);
          fetchRecords();
          alert('Medical Record Saved Successfully!');
        } catch (err) {
          alert(err.message);
        }
      };

      return (
        <div className="container">
          <div className="dashboard-header">
            <h2>Patient Records Management</h2>
            <p>Add new medical records and view patient history.</p>
          </div>
          
          <div className="grid-2">
            <div className="card">
              <h3 className="card-title">Add New Record</h3>
              <form onSubmit={handleSubmit}>
                <div className="form-group">
                  <label>Select Patient</label>
                  <select required value={formData.patientId} onChange={(e) => setFormData({...formData, patientId: e.target.value})}>
                    <option value="">-- Choose Patient --</option>
                    {patients.map(p => <option key={p._id} value={p._id}>{p.name} ({p.email})</option>)}
                  </select>
                </div>
                <div className="form-group">
                  <label>Patient History / Symptoms</label>
                  <textarea rows="4" required placeholder="Describe patient symptoms here..." value={formData.history} onChange={(e) => setFormData({...formData, history: e.target.value})}></textarea>
                </div>
                
                <button type="button" className="btn btn-secondary" style={{marginBottom: '20px', background: 'linear-gradient(135deg, #0ea5e9, #0284c7)'}} onClick={getAiSuggestion} disabled={loadingAI}>
                  {loadingAI ? 'Analyzing...' : '✨ Get AI Diagnosis Suggestion'}
                </button>

                {aiSuggestion && (
                  <div className="ai-box">
                    <div className="ai-icon">✨</div>
                    <div>
                      <strong>AI Suggestion:</strong><br/>
                      {aiSuggestion}
                    </div>
                  </div>
                )}

                <div className="form-group" style={{marginTop: '20px'}}>
                  <label>Official Diagnosis</label>
                  <input type="text" required placeholder="Enter final diagnosis..." value={formData.diagnosis} onChange={(e) => setFormData({...formData, diagnosis: e.target.value})} />
                </div>
                <div className="form-group">
                  <label>Prescribed Medicines</label>
                  <textarea rows="3" required placeholder="List medicines..." value={formData.medicines} onChange={(e) => setFormData({...formData, medicines: e.target.value})}></textarea>
                </div>
                <button type="submit" className="btn">Save Medical Record</button>
              </form>
            </div>

            <div className="card">
              <h3 className="card-title">Recent Records</h3>
              {records.length === 0 ? <p style={{color:'var(--text-muted)'}}>No records available.</p> : (
                <div style={{display: 'flex', flexDirection: 'column', gap: '16px'}}>
                  {records.slice().reverse().map(rec => (
                    <div key={rec._id} style={{padding: '20px', border: '1px solid var(--border)', borderRadius: '12px', background: 'var(--bg-color)'}}>
                      <div style={{display:'flex', justifyContent:'space-between', marginBottom:'12px'}}>
                        <h4 style={{margin:0, color:'var(--primary)', fontSize:'18px'}}>{rec.patient?.name || 'Unknown'}</h4>
                        <span style={{fontSize:'13px', color:'var(--text-muted)'}}>{new Date(rec.createdAt).toLocaleDateString()}</span>
                      </div>
                      <p style={{fontSize:'14px', marginBottom:'8px'}}><strong>Diagnosis:</strong> {rec.diagnosis}</p>
                      <p style={{fontSize:'14px', marginBottom:'8px', color: 'var(--text-muted)'}}><strong>History:</strong> {rec.history}</p>
                      <p style={{fontSize:'14px', margin:0}}><strong>Medicines:</strong> {rec.medicines}</p>
                    </div>
                  ))}
                </div>
              )}
            </div>
          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<DoctorRecords />);
  </script>
</body>
</html>
