<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Doctor Dashboard - MedNexis</title>
  <link rel="stylesheet" href="css/style.css">
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body>
  <nav class="navbar">
    <a href="doctor-dashboard.html" class="logo">MedNexis ⚕️</a>
    <div class="nav-links">
      <a href="doctor-dashboard.html" class="active">Dashboard</a>
      <a href="patient-info.html">Patient Info</a>
      <a href="records.html">Patient Records</a>
      <button onclick="logout()" class="logout-btn">Logout</button>
    </div>
  </nav>

  <div id="root"></div>

  <script src="js/api.js"></script>
  <script>
    if (localStorage.getItem('mednexis_role') !== 'Doctor') {
      window.location.href = 'index.html';
    }
  </script>
  <script type="text/babel">
    const { useState, useEffect } = React;

    function DoctorDashboard() {
      const [appointments, setAppointments] = useState([]);
      const [searchTerm, setSearchTerm] = useState('');
      const [priorityFilter, setPriorityFilter] = useState('All');
      const name = localStorage.getItem('mednexis_name') || 'Doctor';

      useEffect(() => {
        fetchData();
      }, []);

      const fetchData = async () => {
        try {
          const appts = await fetchAPI('/appointments');
          if (!appts || appts.length === 0) throw new Error('No appointments found');
          setAppointments(appts);
        } catch (err) {
          console.error(err);
          // Fallback dummy data for visualization
          setAppointments([
            { _id: 'mock1', patient: { name: 'Ankita Sharma' }, date: new Date(new Date().getTime() + 86400000).toISOString(), status: 'Confirmed', priority: 'High', diseaseCategory: 'Cardiology' },
            { _id: 'mock2', patient: { name: 'Priya Nair' }, date: new Date(new Date().getTime() + 172800000).toISOString(), status: 'Pending', priority: 'Medium', diseaseCategory: 'Neurology' },
            { _id: 'mock3', patient: { name: 'Meera Kulkarni' }, date: new Date(new Date().getTime() + 259200000).toISOString(), status: 'Completed', priority: 'Low', diseaseCategory: 'General Medicine' },
            { _id: 'mock4', patient: { name: 'Arjun Patel' }, date: new Date(new Date().getTime() + 43200000).toISOString(), status: 'Pending', priority: 'High', diseaseCategory: 'Orthopedics' }
          ]);
        }
      };

      const updateStatus = async (id, status) => {
        try {
          await fetchAPI(`/appointments/${id}/status`, 'PATCH', { status });
          fetchData(); // Refresh list
        } catch (err) {
          alert('Failed to update status: ' + err.message);
        }
      };

      const pendingCount = appointments.filter(a => a.status === 'Pending').length;
      const todayCount = appointments.filter(a => new Date(a.date).toDateString() === new Date().toDateString()).length;

      const filtered = appointments.filter(apt => {
        const matchesSearch = apt.patient?.name?.toLowerCase().includes(searchTerm.toLowerCase()) || apt.diseaseCategory?.toLowerCase().includes(searchTerm.toLowerCase());
        const matchesPriority = priorityFilter === 'All' || apt.priority === priorityFilter;
        return matchesSearch && matchesPriority;
      });

      return (
        <div className="container">
          <div className="dashboard-header">
            <h2>Welcome, Dr. {name}</h2>
            <p>Here is your schedule and patient overview for today.</p>
          </div>
          
          <div className="stats-grid">
            <div className="stat-card">
              <span className="stat-title">Total Appointments</span>
              <span className="stat-value">{appointments.length}</span>
            </div>
            <div className="stat-card">
              <span className="stat-title">Pending Approvals</span>
              <span className="stat-value" style={{color: 'var(--warning)'}}>{pendingCount}</span>
            </div>
            <div className="stat-card">
              <span className="stat-title">Appointments Today</span>
              <span className="stat-value" style={{color: 'var(--primary)'}}>{todayCount}</span>
            </div>
          </div>

          <div className="card">
            <div className="card-title">
              Recent Appointments
              <div style={{display: 'flex', gap: '10px'}}>
                <input 
                  type="text" 
                  placeholder="Search patients or diseases..." 
                  style={{padding: '8px 12px', borderRadius: '8px', border: '1px solid var(--border)', fontSize: '13px'}} 
                  value={searchTerm} 
                  onChange={(e) => setSearchTerm(e.target.value)} 
                />
                <select 
                  style={{padding: '8px 12px', borderRadius: '8px', border: '1px solid var(--border)', fontSize: '13px'}}
                  value={priorityFilter}
                  onChange={(e) => setPriorityFilter(e.target.value)}
                >
                  <option value="All">All Priorities</option>
                  <option value="High">High Priority</option>
                  <option value="Medium">Medium Priority</option>
                  <option value="Low">Low Priority</option>
                </select>
              </div>
            </div>
            <div className="table-container">
              <table className="table">
                <thead>
                  <tr>
                    <th>Patient Name</th>
                    <th>Disease & Priority</th>
                    <th>Date & Time</th>
                    <th>Status</th>
                    <th>Actions</th>
                  </tr>
                </thead>
                <tbody>
                  {filtered.length === 0 ? (
                    <tr><td colSpan="5" style={{textAlign: 'center', color: 'var(--text-muted)'}}>No appointments match your search.</td></tr>
                  ) : (
                    filtered.map(apt => (
                      <tr key={apt._id}>
                        <td style={{fontWeight: '600'}}>{apt.patient?.name || 'Unknown Patient'}</td>
                        <td>
                          <div style={{fontWeight: '500', color: 'var(--primary)'}}>{apt.diseaseCategory}</div>
                          <div style={{marginTop: '4px'}}>
                            <span className={`badge badge-${apt.priority}`} style={{padding: '3px 8px', fontSize: '11px'}}>{apt.priority} Priority</span>
                          </div>
                        </td>
                        <td>{new Date(apt.date).toLocaleString([], {weekday: 'short', month: 'short', day: 'numeric', hour: '2-digit', minute:'2-digit'})}</td>
                        <td><span className={`badge badge-${apt.status}`}>{apt.status}</span></td>
                        <td>
                          {apt.status === 'Pending' && (
                            <button className="action-btn confirm" onClick={() => updateStatus(apt._id, 'Confirmed')}>Confirm</button>
                          )}
                          {apt.status === 'Confirmed' && (
                            <button className="action-btn complete" onClick={() => updateStatus(apt._id, 'Completed')}>Mark Completed</button>
                          )}
                          {apt.status === 'Completed' && (
                           <span style={{color: 'var(--text-muted)', fontSize: '13px'}}>No actions needed</span> 
                          )}
                        </td>
                      </tr>
                    ))
                  )}
                </tbody>
              </table>
            </div>
          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<DoctorDashboard />);
  </script>
</body>
</html>
