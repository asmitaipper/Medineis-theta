<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Patient Dashboard - MedNexis</title>
  <link rel="stylesheet" href="css/style.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    .dash-stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-bottom: 36px; }
    .dash-stat {
      background: white; border-radius: 16px; padding: 24px; border: 1px solid var(--border);
      box-shadow: 0 2px 8px rgba(0,0,0,0.04); transition: transform 0.2s, box-shadow 0.2s;
    }
    .dash-stat:hover { transform: translateY(-3px); box-shadow: 0 8px 20px rgba(0,0,0,0.08); }
    .dash-stat-icon { font-size: 28px; margin-bottom: 8px; }
    .dash-stat-num { font-family: 'Outfit', sans-serif; font-size: 32px; font-weight: 700; color: var(--primary); }
    .dash-stat-label { font-size: 13px; color: var(--text-muted); font-weight: 500; margin-top: 4px; }

    .section-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; }
    .section-header h3 { font-family: 'Outfit', sans-serif; font-size: 22px; font-weight: 700; color: var(--text-main); margin: 0; }

    .appt-list { display: flex; flex-direction: column; gap: 14px; }
    .appt-card {
      display: grid; grid-template-columns: 72px 1fr auto; gap: 20px; align-items: center;
      background: white; border-radius: 14px; padding: 20px 24px; border: 1px solid var(--border);
      box-shadow: 0 2px 6px rgba(0,0,0,0.03); transition: transform 0.2s, box-shadow 0.2s;
    }
    .appt-card:hover { transform: translateY(-2px); box-shadow: 0 6px 16px rgba(0,0,0,0.07); }
    .appt-date-box {
      background: linear-gradient(135deg, var(--primary), var(--primary-dark)); color: white;
      border-radius: 12px; text-align: center; padding: 10px 6px; min-width: 72px;
    }
    .appt-date-day { font-family: 'Outfit', sans-serif; font-size: 24px; font-weight: 700; line-height: 1; }
    .appt-date-month { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; margin-top: 2px; opacity: 0.9; }
    .appt-date-time { font-size: 10px; margin-top: 4px; opacity: 0.8; }

    .appt-info h4 { margin: 0 0 4px; font-size: 16px; font-weight: 600; color: var(--text-main); }
    .appt-info .appt-dept { font-size: 13px; color: var(--primary); font-weight: 600; margin-bottom: 4px; }
    .appt-info .appt-meta { font-size: 12px; color: var(--text-muted); display: flex; gap: 12px; align-items: center; flex-wrap: wrap; }

    .appt-status { text-align: right; }

    .records-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 16px; }
    .record-card {
      background: white; border-radius: 14px; padding: 24px; border: 1px solid var(--border);
      box-shadow: 0 2px 6px rgba(0,0,0,0.03); transition: transform 0.2s;
    }
    .record-card:hover { transform: translateY(-2px); box-shadow: 0 6px 16px rgba(0,0,0,0.07); }
    .record-card h4 { margin: 0 0 8px; font-size: 16px; color: var(--primary); font-weight: 600; }
    .record-card .rec-meds { font-size: 13px; color: var(--text-main); margin-bottom: 8px; line-height: 1.5; }
    .record-card .rec-date { font-size: 12px; color: var(--text-muted); }

    @media (max-width: 640px) {
      .appt-card { grid-template-columns: 60px 1fr; gap: 14px; }
      .appt-status { grid-column: 1 / -1; text-align: left; }
    }
  </style>
</head>
<body>
  <nav class="navbar">
    <a href="patient-dashboard.html" class="logo">MedNexis ⚕️</a>
    <div class="nav-links">
      <a href="patient-dashboard.html" class="active">Dashboard</a>
      <a href="appointments.html">Appointments</a>
      <a href="patient-info.html">Patient Info</a>
      <a href="records.html">My Records</a>
      <button onclick="logout()" class="logout-btn" style="margin-left: 20px;">Logout</button>
    </div>
  </nav>

  <div class="container" id="root"></div>

  <script src="js/api.js"></script>
  <script>
    if (localStorage.getItem('mednexis_role') !== 'Patient') {
      window.location.href = 'index.html';
    }
  </script>
  <script type="text/babel">
    const { useState, useEffect } = React;

    function PatientDashboard() {
      const [appointments, setAppointments] = useState([]);
      const [records, setRecords] = useState([]);
      const name = localStorage.getItem('mednexis_name') || 'Patient';

      useEffect(() => { fetchData(); }, []);

      const fetchData = async () => {
        try {
          const appts = await fetchAPI('/appointments');
          const recs = await fetchAPI('/records');
          if (!appts || appts.length === 0) throw new Error('No data');
          setAppointments(appts);
          setRecords(recs || []);
        } catch (err) {
          console.error(err);
          setAppointments([
            { _id: 'mock1', doctor: { name: 'Rajesh Mehta' }, date: new Date(new Date().getTime() + 86400000).toISOString(), status: 'Confirmed', priority: 'High', diseaseCategory: 'Cardiology' },
            { _id: 'mock2', doctor: { name: 'Vikram Desai' }, date: new Date(new Date().getTime() + 172800000).toISOString(), status: 'Pending', priority: 'Medium', diseaseCategory: 'General Medicine' },
            { _id: 'mock3', doctor: { name: 'Kavita Joshi' }, date: new Date(new Date().getTime() + 345600000).toISOString(), status: 'Confirmed', priority: 'High', diseaseCategory: 'Orthopedics' }
          ]);
          setRecords([
            { _id: 'rec1', diagnosis: 'Migraine Headache', medicines: 'Sumatriptan 50mg, Topiramate 25mg', createdAt: new Date().toISOString() },
            { _id: 'rec2', diagnosis: 'Seasonal Viral Fever', medicines: 'Paracetamol 650mg, Rest advised', createdAt: new Date(new Date().getTime() - 2592000000).toISOString() }
          ]);
        }
      };

      const fmtDay = (d) => new Date(d).getDate();
      const fmtMonth = (d) => new Date(d).toLocaleString('en-IN', { month: 'short' });
      const fmtTime = (d) => new Date(d).toLocaleString('en-IN', { hour: '2-digit', minute: '2-digit', hour12: true });
      const fmtFullDate = (d) => new Date(d).toLocaleString('en-IN', { weekday: 'short', day: 'numeric', month: 'short', year: 'numeric' });

      const confirmed = appointments.filter(a => a.status === 'Confirmed').length;
      const pending = appointments.filter(a => a.status === 'Pending').length;

      return (
        <div>
          <div className="dashboard-header">
            <h2>Welcome back, {name}! 👋</h2>
            <p>Here's an overview of your health appointments and records.</p>
          </div>

          {/* Stats */}
          <div className="dash-stats">
            <div className="dash-stat">
              <div className="dash-stat-icon">📅</div>
              <div className="dash-stat-num">{appointments.length}</div>
              <div className="dash-stat-label">Total Appointments</div>
            </div>
            <div className="dash-stat">
              <div className="dash-stat-icon">✅</div>
              <div className="dash-stat-num">{confirmed}</div>
              <div className="dash-stat-label">Confirmed</div>
            </div>
            <div className="dash-stat">
              <div className="dash-stat-icon">⏳</div>
              <div className="dash-stat-num">{pending}</div>
              <div className="dash-stat-label">Pending</div>
            </div>
            <div className="dash-stat">
              <div className="dash-stat-icon">📋</div>
              <div className="dash-stat-num">{records.length}</div>
              <div className="dash-stat-label">Medical Records</div>
            </div>
          </div>

          {/* Upcoming Appointments */}
          <div className="section-header">
            <h3>Upcoming Appointments</h3>
            <a href="appointments.html" style={{color: 'var(--primary)', fontWeight: 600, fontSize: '14px', textDecoration: 'none'}}>+ Book New</a>
          </div>
          <div className="appt-list" style={{marginBottom: '40px'}}>
            {appointments.length === 0 ? (
              <div className="appt-card" style={{textAlign: 'center', color: 'var(--text-muted)', gridTemplateColumns: '1fr'}}>
                No upcoming appointments. <a href="appointments.html">Book one now →</a>
              </div>
            ) : (
              appointments.map(apt => (
                <div className="appt-card" key={apt._id}>
                  <div className="appt-date-box">
                    <div className="appt-date-day">{fmtDay(apt.date)}</div>
                    <div className="appt-date-month">{fmtMonth(apt.date)}</div>
                    <div className="appt-date-time">{fmtTime(apt.date)}</div>
                  </div>
                  <div className="appt-info">
                    <h4>Dr. {apt.doctor?.name || 'Unknown'}</h4>
                    <div className="appt-dept">{apt.diseaseCategory || 'General'}</div>
                    <div className="appt-meta">
                      <span>📅 {fmtFullDate(apt.date)}</span>
                      {apt.priority && <span className={`badge badge-${apt.priority}`} style={{padding: '2px 8px', fontSize: '11px'}}>{apt.priority}</span>}
                    </div>
                  </div>
                  <div className="appt-status">
                    <span className={`badge badge-${apt.status}`}>{apt.status}</span>
                  </div>
                </div>
              ))
            )}
          </div>

          {/* Medical Records */}
          <div className="section-header">
            <h3>Recent Medical Records</h3>
            <a href="records.html" style={{color: 'var(--primary)', fontWeight: 600, fontSize: '14px', textDecoration: 'none'}}>View All →</a>
          </div>
          <div className="records-grid">
            {records.length === 0 ? (
              <div className="record-card" style={{textAlign: 'center', color: 'var(--text-muted)'}}>No records found.</div>
            ) : (
              records.map(rec => (
                <div className="record-card" key={rec._id}>
                  <h4>{rec.diagnosis}</h4>
                  <div className="rec-meds">💊 {rec.medicines}</div>
                  <div className="rec-date">📅 {new Date(rec.createdAt).toLocaleDateString('en-IN', { day: 'numeric', month: 'short', year: 'numeric' })}</div>
                </div>
              ))
            )}
          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<PatientDashboard />);
  </script>
</body>
</html>
