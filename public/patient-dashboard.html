<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Patient Dashboard - MedNexis</title>
  <link rel="stylesheet" href="css/style.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body>
  <nav class="navbar">
    <a href="patient-dashboard.html" class="logo">MedNexis ⚕️</a>
    <div class="nav-links">
      <a href="patient-dashboard.html">Dashboard</a>
      <a href="appointments.html">Appointments</a>
      <a href="records.html">My Records</a>
      <button onclick="logout()" class="logout-btn" style="margin-left: 20px;">Logout</button>
    </div>
  </nav>

  <div class="container" id="root"></div>

  <script src="js/api.js"></script>
  <script>
    if (localStorage.getItem('mednexis_role') !== 'Patient') {
      window.location.href = 'index.html';
    }
  </script>
  <script type="text/babel">
    const { useState, useEffect } = React;

    function PatientDashboard() {
      const [appointments, setAppointments] = useState([]);
      const [records, setRecords] = useState([]);
      const name = localStorage.getItem('mednexis_name');

      useEffect(() => {
        fetchData();
      }, []);

      const fetchData = async () => {
        try {
          const appts = await fetchAPI('/appointments');
          const recs = await fetchAPI('/records');
          if (!appts || appts.length === 0) throw new Error('No appointments found');
          setAppointments(appts);
          setRecords(recs || []);
        } catch (err) {
          console.error(err);
          setAppointments([
            { _id: 'mock1', doctor: { name: 'Gregory House' }, date: new Date(new Date().getTime() + 86400000).toISOString(), status: 'Confirmed', priority: 'High', diseaseCategory: 'Cardiology' },
            { _id: 'mock2', doctor: { name: 'James Wilson' }, date: new Date(new Date().getTime() + 172800000).toISOString(), status: 'Pending', priority: 'Medium', diseaseCategory: 'General' },
            { _id: 'mock3', doctor: { name: 'Amkita' }, date: new Date(new Date().getTime() + 43200000).toISOString(), status: 'Confirmed', priority: 'High', diseaseCategory: 'Cardiology' }
          ]);
          setRecords([
            { _id: 'rec1', diagnosis: 'Migraine Headache', medicines: 'Ibuprofen 400mg', createdAt: new Date().toISOString() }
          ]);
        }
      };

      return (
        <div>
          <div className="dashboard-header">
            <h2>Welcome back, {name}!</h2>
          </div>
          
          <div className="grid-2">
            <div className="card">
              <h3>Upcoming Appointments</h3>
              <table className="table">
                <thead>
                  <tr>
                    <th>Doctor</th>
                    <th>Date</th>
                    <th>Status</th>
                  </tr>
                </thead>
                <tbody>
                  {appointments.length === 0 ? (
                    <tr><td colSpan="3">No appointments found.</td></tr>
                  ) : (
                    appointments.map(apt => (
                      <tr key={apt._id}>
                        <td>Dr. {apt.doctor?.name || 'Unknown'}</td>
                        <td>{new Date(apt.date).toLocaleString()}</td>
                        <td><span className={`badge badge-${apt.status}`}>{apt.status}</span></td>
                      </tr>
                    ))
                  )}
                </tbody>
              </table>
            </div>

            <div className="card">
              <h3>Recent Medical Records</h3>
              <table className="table">
                <thead>
                  <tr>
                    <th>Diagnosis</th>
                    <th>Medicines</th>
                    <th>Date</th>
                  </tr>
                </thead>
                <tbody>
                  {records.length === 0 ? (
                    <tr><td colSpan="3">No records found.</td></tr>
                  ) : (
                    records.map(rec => (
                      <tr key={rec._id}>
                        <td>{rec.diagnosis}</td>
                        <td>{rec.medicines}</td>
                        <td>{new Date(rec.createdAt).toLocaleDateString()}</td>
                      </tr>
                    ))
                  )}
                </tbody>
              </table>
            </div>
          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<PatientDashboard />);
  </script>
</body>
</html>
