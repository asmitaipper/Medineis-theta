<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Dashboard - MedNexis</title>
  <link rel="stylesheet" href="css/style.css">
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body>
  <nav class="navbar">
    <a href="admin-dashboard.html" class="logo">MedNexis ⚡ Admin</a>
    <div class="nav-links">
      <a href="admin-dashboard.html" class="active">Overview</a>
      <button onclick="logout()" class="logout-btn">Logout</button>
    </div>
  </nav>

  <div id="root"></div>

  <script src="js/api.js"></script>
  <script>
    if (localStorage.getItem('mednexis_role') !== 'Admin') {
      window.location.href = 'index.html';
    }
  </script>
  <script type="text/babel">
    const { useState, useEffect } = React;

    function AdminDashboard() {
      const [appointments, setAppointments] = useState([]);
      const [users, setUsers] = useState([]);
      const [searchTerm, setSearchTerm] = useState('');
      const name = localStorage.getItem('mednexis_name') || 'Admin';

      useEffect(() => {
        fetchData();
      }, []);

      const fetchData = async () => {
        try {
          const appts = await fetchAPI('/appointments');
          const allUsers = await fetchAPI('/auth/users'); // Custom endpoints or reuse existing
          
          setAppointments(appts || []);
          setUsers(allUsers || []);
        } catch (err) {
          console.error(err);
        }
      };

      const pendingCount = appointments.filter(a => a.status === 'Pending').length;
      const totalDoctors = users.filter(u => u.role === 'Doctor').length;
      const totalPatients = users.filter(u => u.role === 'Patient').length;

      const filtered = appointments.filter(apt => {
        const query = searchTerm.toLowerCase();
        return apt.patient?.name?.toLowerCase().includes(query) || 
               apt.doctor?.name?.toLowerCase().includes(query) || 
               apt._id.toLowerCase().includes(query);
      });

      return (
        <div className="container">
          <div className="dashboard-header">
            <h2>System Overview</h2>
            <p>Welcome back, Administrator. Here are the global MedNexis statistics.</p>
          </div>
          
          <div className="stats-grid">
            <div className="stat-card" style={{borderColor: 'var(--primary)'}}>
              <span className="stat-title">Total Users</span>
              <span className="stat-value">{users.length}</span>
            </div>
            <div className="stat-card">
              <span className="stat-title">Active Doctors</span>
              <span className="stat-value" style={{color: 'var(--secondary)'}}>{totalDoctors}</span>
            </div>
            <div className="stat-card">
              <span className="stat-title">System Appointments</span>
              <span className="stat-value">{appointments.length}</span>
            </div>
            <div className="stat-card">
              <span className="stat-title">Unresolved Operations</span>
              <span className="stat-value" style={{color: 'var(--warning)'}}>{pendingCount}</span>
            </div>
          </div>

          <div className="card">
            <div className="card-title">
              Global Appointment Ledger
              <input 
                  type="text" 
                  placeholder="Search by Patient, Doctor or ID..." 
                  style={{padding: '8px 12px', borderRadius: '8px', border: '1px solid var(--border)', fontSize: '13px', width: '250px'}} 
                  value={searchTerm} 
                  onChange={(e) => setSearchTerm(e.target.value)} 
                />
            </div>
            <div className="table-container">
              <table className="table">
                <thead>
                  <tr>
                    <th>System ID</th>
                    <th>Patient</th>
                    <th>Assigned Doctor</th>
                    <th>Disease & Priority</th>
                    <th>Date & Time</th>
                    <th>Status</th>
                  </tr>
                </thead>
                <tbody>
                  {filtered.length === 0 ? (
                    <tr><td colSpan="6" style={{textAlign: 'center', color: 'var(--text-muted)'}}>No system activity detected.</td></tr>
                  ) : (
                    filtered.map(apt => (
                      <tr key={apt._id}>
                        <td style={{fontSize: '11px', color: 'var(--text-muted)'}}>{apt._id.slice(-6)}</td>
                        <td style={{fontWeight: '600'}}>{apt.patient?.name || 'Unknown Patient'}</td>
                        <td><strong style={{color:'var(--primary)'}}>Dr. {apt.doctor?.name}</strong> <span style={{fontSize:'12px'}}>({apt.doctor?.specialty})</span></td>
                        <td>
                          <div style={{fontWeight: '500', color: 'var(--text-main)'}}>{apt.diseaseCategory}</div>
                          <div style={{marginTop: '4px'}}>
                            <span className={`badge badge-${apt.priority}`} style={{padding: '3px 8px', fontSize: '11px'}}>{apt.priority} Priority</span>
                          </div>
                        </td>
                        <td>{new Date(apt.date).toLocaleString([], {month: 'short', day: 'numeric', hour: '2-digit', minute:'2-digit'})}</td>
                        <td><span className={`badge badge-${apt.status}`}>{apt.status}</span></td>
                      </tr>
                    ))
                  )}
                </tbody>
              </table>
            </div>
          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<AdminDashboard />);
  </script>
</body>
</html>
