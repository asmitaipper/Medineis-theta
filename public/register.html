<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register - MedNexis</title>
  <link rel="stylesheet" href="css/style.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
  <nav class="navbar">
    <a href="index.html" class="logo">MedNexis ⚕️</a>
  </nav>

  <div class="auth-container">
    <div class="auth-card">
      <h2>Create Account</h2>
      <div id="alert"></div>
      <form id="registerForm">
        <div class="form-group">
          <label>Full Name</label>
          <input type="text" id="name" required placeholder="John Doe">
        </div>
        <div class="form-group">
          <label>Email Address</label>
          <input type="email" id="email" required placeholder="john@example.com">
        </div>
        <div class="form-group">
          <label>Password</label>
          <input type="password" id="password" required placeholder="Create a password">
        </div>
        <div class="form-group">
          <label>Role</label>
          <select id="role" onchange="document.getElementById('specialtyGroup').style.display = this.value === 'Doctor' ? 'block' : 'none'">
            <option value="Patient">Patient</option>
            <option value="Doctor">Doctor</option>
            <option value="Admin">Admin</option>
          </select>
        </div>
        <div class="form-group" id="specialtyGroup" style="display: none;">
          <label>Doctor Specialty</label>
          <select id="specialty">
            <option value="Neurologist">Neurologist (Brain)</option>
            <option value="Cardiologist">Cardiologist (Heart)</option>
            <option value="Orthopedist">Orthopedist (Bone)</option>
            <option value="General Physician">General Physician</option>
          </select>
        </div>
        <button type="submit" class="btn btn-secondary">Register</button>
      </form>
      <div class="switch-auth">
        Already have an account? <a href="index.html">Login here</a>
      </div>
    </div>
  </div>

  <script src="js/api.js"></script>
  <script>
    checkAuthAndRedirect();
    document.getElementById('registerForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const name = document.getElementById('name').value;
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;
      const role = document.getElementById('role').value;
      const specialty = document.getElementById('specialty').value;
      
      try {
        await fetchAPI('/auth/register', 'POST', { name, email, password, role, specialty });
        showAlert('Registration successful! Please login.', false);
        setTimeout(() => window.location.href = 'index.html', 1500);
      } catch (err) {
        showAlert(err.message);
      }
    });
  </script>
</body>
</html>
