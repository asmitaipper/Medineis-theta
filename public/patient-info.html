  <style>
    .patient-profile { max-width: 900px; margin: 0 auto; }
    .profile-header {
      display: flex; align-items: center; gap: 24px; padding: 32px;
      background: linear-gradient(135deg, #6343e8 0%, #4b30bd 100%);
      border-radius: 20px; color: white; margin-bottom: 28px;
      box-shadow: 0 12px 32px rgba(99, 67, 232, 0.25);
    }
    .profile-avatar {
      width: 80px; height: 80px; background: rgba(255,255,255,0.2);
      border-radius: 50%; display: flex; align-items: center; justify-content: center;
      font-size: 36px; font-weight: 700; flex-shrink: 0; border: 3px solid rgba(255,255,255,0.4);
    }
    .profile-meta h2 { margin: 0 0 6px; font-size: 26px; }
    .profile-meta p { margin: 0; opacity: 0.85; font-size: 14px; }
    .patient-selector {
      margin-bottom: 28px; display: flex; align-items: center; gap: 16px;
      background: white; padding: 20px 28px; border-radius: 16px;
      box-shadow: 0 4px 16px rgba(0,0,0,0.04); border: 1px solid #e2e8f0;
    }
    .patient-selector label { font-weight: 600; font-size: 15px; white-space: nowrap; }
    .patient-selector select {
      flex: 1; padding: 12px 16px; border-radius: 10px; border: 1px solid #e2e8f0;
      font-size: 15px; font-family: 'Inter', sans-serif; background: #f8fafc;
      cursor: pointer; transition: border-color 0.2s;
    }
    .patient-selector select:focus { border-color: var(--primary); outline: none; box-shadow: 0 0 0 4px rgba(99,67,232,0.1); }
    .info-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 24px; margin-bottom: 28px; }
    @media (max-width: 640px) { .info-grid { grid-template-columns: 1fr; } }
    .info-card {
      background: white; border-radius: 16px; padding: 28px;
      box-shadow: 0 4px 16px rgba(0,0,0,0.04); border: 1px solid #e2e8f0;
    }
    .info-card h3 {
      font-family: 'Outfit', sans-serif; font-size: 18px; margin-bottom: 18px;
      color: var(--primary); display: flex; align-items: center; gap: 8px;
    }
    .info-row { display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid #f1f5f9; font-size: 14px; }
    .info-row:last-child { border-bottom: none; }
    .info-label { color: var(--text-muted); font-weight: 500; }
    .info-value { color: var(--text-main); font-weight: 600; text-align: right; max-width: 55%; }
    .med-timeline { position: relative; padding-left: 24px; }
    .med-timeline::before { content: ''; position: absolute; left: 7px; top: 0; bottom: 0; width: 2px; background: linear-gradient(to bottom, var(--primary), #e2e8f0); }
    .med-entry { position: relative; padding: 16px 0 16px 16px; }
    .med-entry::before { content: ''; position: absolute; left: -20px; top: 22px; width: 12px; height: 12px; background: var(--primary); border-radius: 50%; border: 2px solid white; box-shadow: 0 0 0 3px rgba(99,67,232,0.2); }
    .med-entry-date { font-size: 12px; color: var(--text-muted); margin-bottom: 4px; }
    .med-entry-title { font-weight: 600; font-size: 15px; color: var(--text-main); margin-bottom: 4px; }
    .med-entry-detail { font-size: 13px; color: var(--text-muted); line-height: 1.6; }
    .medicine-tag { display: inline-block; padding: 4px 12px; border-radius: 20px; font-size: 12px; font-weight: 600; margin: 3px 4px 3px 0; }
    .medicine-tag.active { background: #d1fae5; color: #065f46; }
    .medicine-tag.past { background: #f1f5f9; color: #64748b; }
    .vitals-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; }
    @media (max-width: 640px) { .vitals-grid { grid-template-columns: repeat(2, 1fr); } }
    .vital-box { text-align: center; padding: 16px 10px; background: #f8fafc; border-radius: 12px; border: 1px solid #e2e8f0; }
    .vital-box .vital-num { font-family: 'Outfit', sans-serif; font-size: 22px; font-weight: 700; color: var(--primary); }
    .vital-box .vital-label { font-size: 11px; color: var(--text-muted); margin-top: 4px; }
    .full-width-card { grid-column: 1 / -1; }
